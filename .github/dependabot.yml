version: 2
updates:
  # 1. NPM Dependencies (Root Directory)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    rebase-strategy: "auto"
    target-branch: "main"
    groups:
      all-dependencies:
        patterns:
          - "react-19.*"
          - "@mui/*"
          - "@emotion/*"
          - "typescript-5.*"
          - "vite*"
          - "@vitejs/plugin-react*"
          - "@crxjs/vite-plugin*"
          - "eslint*"
          - "prettier*"
          - "@typescript-eslint/*"
          - "@testing-library/*"
          - "jest*"
          - "vitest*"
          - "@testing-library/react*"
          - "@testing-library/user-event*"
          - "@playwright/test*"
          - "jsdom*"
          - "@types/*"

  # 2. GitHub Actions Workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      all-actions:
        patterns:
          - "*"
