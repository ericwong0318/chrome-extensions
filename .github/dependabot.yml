version: 2
updates:
  # 1. NPM Dependencies (Root Directory)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"
    target-branch: "main"
    groups:
      core-ui:
        patterns:
          - "react-19.*"
          - "@mui/*"
      dev-tooling:
        patterns:
          - "eslint*"
          - "prettier*"
          - "@typescript-eslint/*"
      testing-library:
        patterns:
          - "@testing-library/*"
          - "jest*"
          - "vitest*"
      linters-and-formatters:
        patterns:
          - "eslint*"
          - "prettier*"
          - "@typescript-eslint/*"

  # 2. GitHub Actions Workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns:
          - "*"