name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    container: node:24-bookworm-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache npm dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Install dependencies
        run: npm ci

      - name: Sync manifest version with package.json
        run: node -e "const fs=require('fs');const p=require('./package.json');const m=JSON.parse(fs.readFileSync('manifest.json','utf8'));m.version=p.version;fs.writeFileSync('manifest.json',JSON.stringify(m,null,2)+'\n')"

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Verify manifest version matches tag
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_VERSION#v}"
          MANIFEST_VERSION="$(node -e "process.stdout.write(require('./manifest.json').version)")"
          echo "Tag version:     $TAG_VERSION"
          echo "Manifest version: $MANIFEST_VERSION"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Version drift detected! Tag v$TAG_VERSION but manifest.json is $MANIFEST_VERSION. Aborting release."
            exit 1
          fi

      - name: Install zip
        run: apt-get update && apt-get install -y --no-install-recommends zip

      - name: Package extension
        run: cd dist && zip -r ../zhihu-user-blocker-${{ github.ref_name }}.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: zhihu-user-blocker-${{ github.ref_name }}.zip
          generate_release_notes: false
